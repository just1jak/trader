version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PROVIDER_ENV_PATH=/app/.env
    volumes:
      - ./.env:/app/.env
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-papertrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-papertrader}
      POSTGRES_DB: ${POSTGRES_DB:-papertrading}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
